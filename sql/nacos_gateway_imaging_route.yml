# 文件编码: UTF-8
# ============================================================
# 1. 路由配置
#    合并到 Nacos: ruoyi-gateway-dev.yml -> spring.cloud.gateway.server.webflux.routes
#    （YAML 列表项，与其他路由缩进对齐）
# ============================================================

            - id: ruoyi-imaging
              uri: lb://ruoyi-imaging
              predicates:
                - Path=/imaging/**
              filters:
                - StripPrefix=1

